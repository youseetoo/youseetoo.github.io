<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>openUC2 — Filter Holder Configurator</title>
  <script type="module" crossorigin src="/openuc2-filter-designer/assets/index-BoEQMA6a.js"></script>
  <link rel="stylesheet" crossorigin href="/openuc2-filter-designer/assets/index-D-rlQ8yN.css">
</head>
<body>

<div id="loading-overlay">
  <img src="/openuc2-filter-designer/openuc2-logo.png" alt="openUC2" class="loading-logo">
  <div class="loader"></div>
  <div id="loading-text">Initializing OpenCascade kernel...</div>
</div>

<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo-row"><img src="/openuc2-filter-designer/openuc2-logo.png" alt="openUC2"></div>
    <h1>Filter Holder</h1>
    <p>Excitation / Emission / Dichroic cutter</p>
  </div>

  <!-- OPTICAL CENTER  (invisible for now)-->
  <div class="param-section">
    <h3>Optical Center</h3>
    <div style="display:flex;gap:6px;">
      <div class="param-group" style="flex:1"><label>X <span class="unit">mm</span></label><input type="number" id="center-x" value="0" step="1" hidden></div>
      <div class="param-group" style="flex:1"><label>Y <span class="unit">mm</span></label><input type="number" id="center-y" value="0" step="0.1" hidden></div>
      <div class="param-group" style="flex:1"><label>Z <span class="unit">mm</span></label><input type="number" id="center-z" value="-8.5" step="0.5" hidden></div>
    </div>
  </div>

  <!-- EXCITATION -->
  <div class="param-section">
    <h3>Excitation Filter</h3>
    <div class="checkbox-group"><input type="checkbox" id="ex-enable" checked><label for="ex-enable">Cut excitation slot</label></div>
    <div style="display:flex;gap:6px;">
      <div class="param-group" style="flex:1"><label>Diameter <span class="unit">mm</span></label><input type="number" id="ex-diameter" value="26" step="0.5" min="1"></div>
      <div class="param-group" style="flex:1"><label>Thickness <span class="unit">mm</span></label><input type="number" id="ex-thickness" value="3" step="0.5" min="0.5"></div>
    </div>
    <div style="display:flex;gap:6px;">
      <div class="param-group" style="flex:1">
        <label>Axis</label>
        <select id="ex-axis"><option value="X">X</option><option value="Y" selected>Y</option><option value="Z">Z</option></select>
      </div>
      <div class="param-group" style="flex:1"><label>Offset <span class="unit">mm</span></label><input type="number" id="ex-offset" value="21" step="1"></div>
    </div>
  </div>

  <!-- EMISSION -->
  <div class="param-section">
    <h3>Emission Filter</h3>
    <div class="checkbox-group"><input type="checkbox" id="em-enable" checked><label for="em-enable">Cut emission slot</label></div>
    <div style="display:flex;gap:6px;">
      <div class="param-group" style="flex:1"><label>Diameter <span class="unit">mm</span></label><input type="number" id="em-diameter" value="26" step="0.5" min="1"></div>
      <div class="param-group" style="flex:1"><label>Thickness <span class="unit">mm</span></label><input type="number" id="em-thickness" value="3" step="0.5" min="0.5"></div>
    </div>
    <div style="display:flex;gap:6px;">
      <div class="param-group" style="flex:1">
        <label>Axis</label>
        <select id="em-axis"><option value="X" selected>X</option><option value="Y">Y</option><option value="Z">Z</option></select>
      </div>
      <div class="param-group" style="flex:1"><label>Offset <span class="unit">mm</span></label><input type="number" id="em-offset" value="21" step="1"></div>
    </div>
  </div>

  <!-- DICHROIC -->
  <div class="param-section">
    <h3>Dichroic (45°)</h3>
    <div class="checkbox-group"><input type="checkbox" id="di-enable" checked><label for="di-enable">Cut dichroic slot</label></div>
    <div class="param-group">
      <label>Shape</label>
      <select id="di-shape"><option value="rect" selected>Rectangular</option><option value="round">Round</option></select>
    </div>
    <div id="di-rect-params">
      <div style="display:flex;gap:6px;">
        <div class="param-group" style="flex:1"><label>Width <span class="unit">mm</span></label><input type="number" id="di-width" value="25" step="0.5" min="1"></div>
        <div class="param-group" style="flex:1"><label>Height <span class="unit">mm</span></label><input type="number" id="di-height" value="36" step="0.5" min="1"></div>
      </div>
    </div>
    <div id="di-round-params" style="display:none;">
      <div class="param-group"><label>Diameter <span class="unit">mm</span></label><input type="number" id="di-diameter" value="25" step="0.5" min="1"></div>
    </div>
    <div style="display:flex;gap:6px;">
      <div class="param-group" style="flex:1"><label>Thickness <span class="unit">mm</span></label><input type="number" id="di-thickness" value="2" step="0.5" min="0.5"></div>
      <div class="param-group" style="flex:1">
        <label>45° plane</label>
        <select id="di-plane"><option value="XY" selected>X ↔ Y</option><option value="XZ">X ↔ Z</option><option value="YZ">Y ↔ Z</option></select>
      </div>
    </div>
  </div>

  <!-- ACTIONS -->
  <div class="param-section">
    <h3>Actions</h3>
    <button class="btn btn-primary" id="btn-generate" disabled>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 2l8 6-8 6V2z" fill="currentColor"/></svg>
      Generate Cuts
    </button>
    <div style="height:8px"></div>
    <button class="btn btn-secondary" id="btn-reset" disabled>Reset to Original</button>
    <div id="error-log"></div>
  </div>

  <!-- EXPORT -->
  <div class="param-section">
    <h3>Export</h3>
    <div class="param-group"><label>Filename</label><input type="text" id="param-filename" value="FilterHolder-CUSTOM" placeholder="filename"></div>
    <div class="export-row">
      <button class="btn btn-secondary" id="btn-export-step" disabled>↓ STEP</button>
      <button class="btn btn-secondary" id="btn-export-stl" disabled>↓ STL</button>
    </div>
  </div>

  <div id="status-bar"><div class="dot loading" id="status-dot"></div><span id="status-text">Loading OpenCascade...</span></div>
</aside>

<main class="viewport">
  <canvas id="three-canvas"></canvas>
  <div class="viewport-overlay">
    <button class="viewport-btn" id="btn-fit" title="Fit view">⊞</button>
    <button class="viewport-btn" id="btn-wireframe" title="Toggle wireframe">◇</button>
  </div>
  <div class="info-badge" id="info-badge" style="display:none;"></div>
  <div id="processing-overlay">
    <div class="loader"></div>
    <div style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:rgba(255,255,255,0.5);">Processing boolean operations...</div>
  </div>
</main>

</body>
</html>
