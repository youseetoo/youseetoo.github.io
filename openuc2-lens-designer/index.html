<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>openUC2 — MAS-2000 Lens Holder Configurator</title>
  <script type="module" crossorigin src="/openuc2-lens-designer/assets/index-CqJBBmBB.js"></script>
  <link rel="stylesheet" crossorigin href="/openuc2-lens-designer/assets/index-p4WXktdx.css">
</head>
<body>

<div id="loading-overlay">
  <img src="/openuc2-lens-designer/openuc2-logo.png" alt="openUC2" class="loading-logo">
  <div class="loader"></div>
  <div id="loading-text">Initializing OpenCascade kernel...</div>
</div>

<aside class="sidebar">
  <div class="sidebar-header">
    <div class="logo-row">
      <img src="/openuc2-lens-designer/openuc2-logo.png" alt="openUC2">
    </div>
    <h1>MAS-2000 Configurator</h1>
    <p>Lens holder pocket generator</p>
  </div>

  <div class="param-section">
    <h3>Lens Parameters</h3>
    <div class="param-group">
      <label>Edge thickness <span class="unit">mm</span></label>
      <input type="number" id="param-edge-thickness" value="2.32" step="0.01" min="0.1">
    </div>
    <div class="param-group">
      <label>Lens diameter <span class="unit">mm</span></label>
      <input type="number" id="param-diameter" value="25.5" step="0.1" min="1">
    </div>
  </div>

  <div class="param-section">
    <h3>Optical Axis</h3>
    <div class="checkbox-group">
      <input type="checkbox" id="param-axis-hole" checked>
      <label for="param-axis-hole">Cut optical axis hole</label>
    </div>
    <div class="param-group">
      <label>Axis hole diameter <span class="unit">mm</span></label>
      <input type="number" id="param-axis-dia" value="20" step="0.1" min="0.5">
    </div>
  </div>

  <div class="param-section">
    <h3>Actions</h3>
    <button class="btn btn-primary" id="btn-generate" disabled>
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M4 2l8 6-8 6V2z" fill="currentColor"/></svg>
      Generate Cut
    </button>
    <div style="height:8px"></div>
    <button class="btn btn-secondary" id="btn-reset" disabled>Reset to Original</button>
    <div id="error-log"></div>
  </div>

  <div class="param-section">
    <h3>Export</h3>
    <div class="param-group">
      <label>Filename</label>
      <input type="text" id="param-filename" value="MAS-2000-CUSTOM" placeholder="export filename">
    </div>
    <div class="export-row">
      <button class="btn btn-secondary" id="btn-export-step" disabled>↓ STEP</button>
      <button class="btn btn-secondary" id="btn-export-stl" disabled>↓ STL</button>
    </div>
  </div>

  <div id="status-bar">
    <div class="dot loading" id="status-dot"></div>
    <span id="status-text">Loading OpenCascade...</span>
  </div>
</aside>

<main class="viewport">
  <canvas id="three-canvas"></canvas>
  <div class="viewport-overlay">
    <button class="viewport-btn" id="btn-fit" title="Fit view">⊞</button>
    <button class="viewport-btn" id="btn-wireframe" title="Toggle wireframe">◇</button>
  </div>
  <div class="info-badge" id="info-badge" style="display:none;"></div>
  <div id="processing-overlay">
    <div class="loader"></div>
    <div style="font-family:'IBM Plex Mono',monospace;font-size:12px;color:rgba(255,255,255,0.5);">Processing boolean operation...</div>
  </div>
</main>

</body>
</html>
