<!DOCTYPE html>
<html>
  <head>
    <title>AR Poster - Assembly Frame</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>

  <body style="margin: 0px; overflow: hidden;">
    <a-scene 
      embedded 
      arjs="sourceType: webcam; detectionMode: mono_and_matrix; matrixCodeType: 5x5; debugUIEnabled: false;"
      vr-mode-ui="enabled: false"
    >
      
      <a-assets>
        <a-asset-item id="frameModel" src="Assembly-FRAME.glb"></a-asset-item>
      </a-assets>

      <a-marker type="barcode" value="1">
        
        <a-entity 
          gltf-model="#frameModel"
          scale="0.5 0.5 0.5" 
          rotation="-90 0 0" 
          position="0 0 0"
        >
        </a-entity>

      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
